<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阈值设置 - 蔬菜大棚土壤墒情监测平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body { background: #f8f9fa; }
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌱 蔬菜大棚土壤墒情监测平台</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">实时监控</a>
                <a class="nav-link" href="/history">历史数据</a>
                <a class="nav-link" href="/alerts">报警日志</a>
                <a class="nav-link" href="/analysis">大数据分析</a>
                <a class="nav-link" href="/reports">数据报告</a>
                <a class="nav-link active" href="/weather">天气查询</a>
                <a class="nav-link" href="/threshold">阈值设置</a>
            </div>
        </div>
    </nav>
    <div class="container mt-5">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card">
                    <div class="card-header bg-white text-center">
                        <h4 class="mb-0">自定义土壤墒情预警阈值</h4>
                    </div>
                    <div class="card-body">
                        <div class="mb-3">
                            <label class="form-label">选择监测节点</label>
                            <select id="nodeSelect" class="form-select">
                                <option value="Node1">Node1</option>
                                <option value="Node2">Node2</option>
                                <option value="Node3">Node3</option>
                            </select>
                        </div>

                        <div class="row">
                            <div class="col-6">
                                <label class="form-label">温度下限 (℃)</label>
                                <input type="number" id="tempMin" class="form-control" value="15" step="0.1">
                            </div>
                            <div class="col-6">
                                <label class="form-label">温度上限 (℃)</label>
                                <input type="number" id="tempMax" class="form-control" value="30" step="0.1">
                            </div>
                        </div>
                        <div class="row mt-3">
                            <div class="col-6">
                                <label class="form-label">湿度下限 (%RH)</label>
                                <input type="number" id="humMin" class="form-control" value="40" step="0.1">
                            </div>
                            <div class="col-6">
                                <label class="form-label">湿度上限 (%RH)</label>
                                <input type="number" id="humMax" class="form-control" value="80" step="0.1">
                            </div>
                        </div>

                        <button onclick="saveThreshold()" class="btn btn-success w-100 mt-4">💾 保存阈值设置</button>

                        <!-- 当前阈值显示 -->
                        <div class="mt-4 p-3 bg-light rounded" id="currentThreshold"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        function loadCurrentThreshold() {
            const node = document.getElementById('nodeSelect').value;
            fetch(`/api/alert`)
                .then(res => res.json())
                .then(res => {
                    if (res.code === 200 && res.data[node]) {
                        const t = res.data[node];
                        document.getElementById('currentThreshold').innerHTML = `
                            <strong>当前${node}阈值：</strong><br>
                            温度：${t.status === 'normal' ? '正常' : '异常'}（15~30℃）<br>
                            湿度：${t.status === 'normal' ? '正常' : '异常'}（40~80%RH）
                        `;
                    }
                });
        }

        function saveThreshold() {
            const node = document.getElementById('nodeSelect').value;
            const data = {
                node_id: node,
                temp_min: parseFloat(document.getElementById('tempMin').value),
                temp_max: parseFloat(document.getElementById('tempMax').value),
                hum_min: parseFloat(document.getElementById('humMin').value),
                hum_max: parseFloat(document.getElementById('humMax').value)
            };

            fetch('/api/set_threshold', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            })
            .then(res => res.json())
            .then(res => {
                if (res.code === 200) {
                    alert(`✅ ${node} 阈值设置成功！`);
                    loadCurrentThreshold();
                } else {
                    alert('保存失败：' + res.msg);
                }
            });
        }

        // 节点切换时刷新当前阈值
        document.getElementById('nodeSelect').addEventListener('change', loadCurrentThreshold);
        window.onload = loadCurrentThreshold;
    </script>

    <footer class="text-center py-3 mt-5 text-muted">
        © 2026 王健 大连东软信息学院 | GitHub: 20247140130
    </footer>
</body>
</html>
