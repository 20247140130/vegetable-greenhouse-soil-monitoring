<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据报告 - 蔬菜大棚土壤墒情监测平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style> body { background: #f8f9fa; } </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌱 蔬菜大棚土壤墒情监测平台</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">实时监控</a>
                <a class="nav-link" href="/history">历史数据</a>
                <a class="nav-link" href="/alerts">报警日志</a>
                <a class="nav-link" href="/analysis">大数据分析</a>
                <a class="nav-link" href="/reports">数据报告</a>
                <a class="nav-link active" href="/weather">天气查询</a>
                <a class="nav-link" href="/threshold">阈值设置</a>
            </div>
        </div>
    </nav>
    <div class="container mt-4">
        <h2 class="text-center mb-4">📊 数据分析报告</h2>

        <div class="row g-3 mb-4">
            <div class="col-md-3"><div class="card text-center p-3"><h5 id="avgTemp">-</h5><small>平均温度 (℃)</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3"><h5 id="avgHum">-</h5><small>平均湿度 (%RH)</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3 bg-success text-white"><h5 id="waterSaving">41.5%</h5><small>估算节水率</small></div></div>
            <div class="col-md-3"><div class="card text-center p-3"><h5 id="alertTimes">0</h5><small>本月报警次数</small></div></div>
        </div>

        <div class="card mb-4">
            <div class="card-header">节点对比（最近30天）</div>
            <div class="card-body">
                <div id="compareChart" style="width:100%; height:400px;"></div>
            </div>
        </div>

        <div class="card">
            <div class="card-header d-flex justify-content-between">
                <h5>月趋势分析</h5>
                <button onclick="exportReport()" class="btn btn-success btn-sm">导出 CSV</button>
            </div>
            <div class="card-body">
                <div id="trendChart" style="width:100%; height:400px;"></div>
            </div>
        </div>
    </div>

    <script>
    let compareChart = echarts.init(document.getElementById('compareChart'), 'light');
    let trendChart = echarts.init(document.getElementById('trendChart'), 'light');

    function loadReport() {
        fetch('/api/reports')
            .then(res => res.json())
            .then(data => {
                // 更新统计卡片
                document.getElementById('avgTemp').textContent = data.avg_temp.toFixed(1) + '℃';
                document.getElementById('avgHum').textContent = data.avg_hum.toFixed(1) + '%';
                document.getElementById('alertTimes').textContent = data.alert_count || 0;

                // ==================== 节点对比柱状图 ====================
                compareChart.setOption({
                    title: { text: '各节点最近30天平均值对比', left: 'center', textStyle: { fontSize: 16 } },
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['平均温度 (℃)', '平均湿度 (%RH)'], bottom: 0 },
                    xAxis: {
                        type: 'category',
                        data: data.nodes || ['Node1', 'Node2', 'Node3']
                    },
                    yAxis: [
                        { type: 'value', name: '温度 (℃)', position: 'left' },
                        { type: 'value', name: '湿度 (%RH)', position: 'right' }
                    ],
                    series: [
                        {
                            name: '平均温度 (℃)',
                            type: 'bar',
                            data: data.avg_temps || [23.8, 24.1, 22.9],
                            itemStyle: { color: '#ff6b6b' }
                        },
                        {
                            name: '平均湿度 (%RH)',
                            type: 'bar',
                            yAxisIndex: 1,
                            data: data.avg_hums || [67.2, 65.8, 69.5],
                            itemStyle: { color: '#4ecdc4' }
                        }
                    ]
                });

                // ==================== 月趋势折线图 ====================
                trendChart.setOption({
                    title: { text: '土壤墒情月趋势变化', left: 'center' },
                    tooltip: { trigger: 'axis' },
                    legend: { data: ['温度', '湿度'], top: 10 },
                    grid: { left: '8%', right: '8%', bottom: '15%' },
                    xAxis: {
                        type: 'category',
                        data: data.dates || ['03-01','03-05','03-10','03-15','03-20','03-25','03-30']
                    },
                    yAxis: [
                        { type: 'value', name: '温度 (℃)' },
                        { type: 'value', name: '湿度 (%RH)', position: 'right' }
                    ],
                    series: [
                        {
                            name: '温度',
                            type: 'line',
                            smooth: true,
                            data: data.temp_trend || [22, 24, 25, 23, 26, 24, 23],
                            itemStyle: { color: '#ff6b6b' },
                            lineStyle: { width: 4 }
                        },
                        {
                            name: '湿度',
                            type: 'line',
                            smooth: true,
                            yAxisIndex: 1,
                            data: data.hum_trend || [68, 65, 70, 72, 66, 69, 67],
                            itemStyle: { color: '#4ecdc4' },
                            lineStyle: { width: 4 }
                        }
                    ]
                });
            })
            .catch(err => console.error("报告加载失败", err));
    }

    // 窗口大小变化时自适应图表
    window.addEventListener('resize', () => {
        compareChart.resize();
        trendChart.resize();
    });

    window.onload = loadReport;
</script>
</body>
</html>
