<!DOCTYPE html>
<html lang="zh-HK">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>物联网蔬菜大棚监测节点配置</title>
  <!-- Bootstrap 5 CDN -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
  <!-- Font Awesome 图标 -->
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body {
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      background: rgba(255, 255, 255, 0.95);
      border: none;
      border-radius: 20px;
      box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      max-width: 500px;
      width: 100%;
    }
    .card-header {
      background: linear-gradient(90deg, #667eea, #764ba2);
      color: white;
      text-align: center;
      padding: 1.5rem;
      font-weight: bold;
      font-size: 1.4rem;
    }
    .form-label {
      font-weight: 500;
      color: #333;
    }
    .input-group-text {
      background-color: #f8f9fa;
      cursor: pointer;
    }
    .btn-primary {
      background: linear-gradient(90deg, #667eea, #764ba2);
      border: none;
      transition: all 0.3s;
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
    }
    .btn-danger {
      transition: all 0.3s;
    }
    .alert {
      margin-top: 1rem;
      border-radius: 10px;
    }
    .spinner-border {
      vertical-align: middle;
    }
    #new_node_input {
      display: none;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <div class="card-header">
        <i class="fas fa-cog me-2"></i> 节点配置中心
      </div>
      <div class="card-body p-4">
        <!-- Flash 消息显示 -->
        {% with messages = get_flashed_messages(with_categories=true) %}
          {% if messages %}
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} alert-dismissible fade show" role="alert">
                {{ message }}
                <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
              </div>
            {% endfor %}
          {% endif %}
        {% endwith %}

        <form id="configForm" action="{{ url_for('config') }}" method="POST">
          <!-- 节点选择 -->
          <h5 class="mt-3 mb-3 text-primary"><i class="fas fa-server me-2"></i> 选择或新建节点</h5>
          <div class="mb-3">
            <label for="node_id_select" class="form-label">节点 ID</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-tag"></i></span>
              <select class="form-select" id="node_id_select" name="node_id_select">
                {% for node in nodes %}
                  <option value="{{ node }}">{{ node }}</option>
                {% endfor %}
                <option value="new">新建节点</option>
              </select>
            </div>
            <div class="mt-2" id="new_node_input">
              <input type="text" class="form-control" id="node_id" name="node_id" placeholder="建议：{{ suggested_new }}" value="{{ suggested_new }}">
            </div>
          </div>

          <!-- WiFi 配置 -->
          <h5 class="mt-4 mb-3 text-primary"><i class="fas fa-wifi me-2"></i> WiFi 设置</h5>
          <div class="mb-3">
            <label for="ssid" class="form-label">WiFi 名称 (SSID)</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-network-wired"></i></span>
              <input type="text" class="form-control" id="ssid" name="ssid" required placeholder="例如：MyHomeWiFi">
            </div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">WiFi 密码</label>
            <div class="input-group">
              <span class="input-group-text" id="togglePassword"><i class="fas fa-eye"></i></span>
              <input type="password" class="form-control" id="password" name="password" required placeholder="输入密码">
            </div>
          </div>

          <!-- MQTT 配置 -->
          <h5 class="mt-4 mb-3 text-primary"><i class="fas fa-server me-2"></i> MQTT 服务器设置</h5>
          <div class="mb-3">
            <label for="mqtt_server" class="form-label">MQTT 服务器地址</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-globe"></i></span>
              <input type="text" class="form-control" id="mqtt_server" name="mqtt_server" required placeholder="例如：broker-cn.emqx.io" value="broker-cn.emqx.io">
            </div>
          </div>
          <div class="mb-3">
            <label for="mqtt_port" class="form-label">MQTT 端口</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-plug"></i></span>
              <input type="number" class="form-control" id="mqtt_port" name="mqtt_port" required placeholder="1883" value="1883">
            </div>
          </div>
          <div class="mb-3">
            <label for="mqtt_user" class="form-label">MQTT 用户名（可选）</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-user"></i></span>
              <input type="text" class="form-control" id="mqtt_user" name="mqtt_user" placeholder="匿名留空">
            </div>
          </div>
          <div class="mb-3">
            <label for="mqtt_pass" class="form-label">MQTT 密码（可选）</label>
            <div class="input-group">
              <span class="input-group-text" id="toggleMqttPass"><i class="fas fa-eye"></i></span>
              <input type="password" class="form-control" id="mqtt_pass" name="mqtt_pass" placeholder="匿名留空">
            </div>
          </div>
          <div class="mb-4">
            <label for="mqtt_topic" class="form-label">MQTT 主题（Topic）</label>
            <div class="input-group">
              <span class="input-group-text"><i class="fas fa-comment-dots"></i></span>
              <input type="text" class="form-control" id="mqtt_topic" name="mqtt_topic" required placeholder="例如：greenhouse/soil/data/Node1" value="greenhouse/soil/data/Node1">
            </div>
          </div>

          <!-- 提交按钮 -->
          <div class="d-grid">
            <button type="submit" class="btn btn-primary btn-lg" id="submitBtn">
              <i class="fas fa-save me-2"></i> 保存并应用配置
            </button>
          </div>

          <!-- 加载动画 -->
          <div class="mt-3 text-center" id="loading" style="display:none;">
            <div class="spinner-border text-primary" role="status"></div>
            <p class="mt-2">正在保存配置，请稍候...</p>
          </div>
        </form>

        <!-- 删除节点按钮 -->
        <div class="mt-4">
          <button type="button" class="btn btn-danger btn-lg w-100" data-bs-toggle="modal" data-bs-target="#deleteModal">
            <i class="fas fa-trash me-2"></i> 删除节点
          </button>
        </div>
      </div>
      <div class="card-footer text-center text-muted py-3">
        蔬菜大棚土壤墒情监测系统 · 配置页面
      </div>
    </div>
  </div>

  <!-- 删除确认模态框 -->
  <div class="modal fade" id="deleteModal" tabindex="-1" aria-labelledby="deleteModalLabel" aria-hidden="true">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title" id="deleteModalLabel">确认删除节点</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
          <form id="deleteForm" action="{{ url_for('delete_node') }}" method="POST">
            <label for="node_id_to_delete" class="form-label">选择要删除的节点</label>
            <select class="form-select" id="node_id_to_delete" name="node_id_to_delete" required>
              <option value="">-- 选择节点 --</option>
              {% for node in nodes %}
                <option value="{{ node }}">{{ node }}</option>
              {% endfor %}
            </select>
            <div class="mt-3 text-danger">
              注意：删除后，该节点的所有实时数据、阈值和历史记录将被永久清除！
            </div>
          </form>
        </div>
        <div class="modal-footer">
          <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
          <button type="submit" class="btn btn-danger" form="deleteForm">确认删除</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Bootstrap JS + 交互脚本 -->
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    // 节点选择逻辑
    const nodeSelect = document.getElementById('node_id_select');
    const newNodeInput = document.getElementById('new_node_input');
    const nodeIdInput = document.getElementById('node_id');

    nodeSelect.addEventListener('change', function() {
      if (this.value === 'new') {
        newNodeInput.style.display = 'block';
        nodeIdInput.required = true;
      } else {
        newNodeInput.style.display = 'none';
        nodeIdInput.required = false;
        nodeIdInput.value = '';  // 清空新建输入
      }
    });

    // 表单提交前处理 node_id
    document.getElementById('configForm').addEventListener('submit', function(e) {
      if (nodeSelect.value === 'new') {
        // 使用手动输入的 node_id
        nodeIdInput.name = 'node_id';
      } else {
        // 使用下拉选择的 node_id（创建隐藏 input）
        const hiddenInput = document.createElement('input');
        hiddenInput.type = 'hidden';
        hiddenInput.name = 'node_id';
        hiddenInput.value = nodeSelect.value;
        this.appendChild(hiddenInput);
      }
    });

    // 密码显示/隐藏切换（WiFi 密码）
    document.getElementById('togglePassword').addEventListener('click', function () {
      const passwordInput = document.getElementById('password');
      const icon = this.querySelector('i');
      if (passwordInput.type === 'password') {
        passwordInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        passwordInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // 密码显示/隐藏切换（MQTT 密码）
    document.getElementById('toggleMqttPass').addEventListener('click', function () {
      const mqttPassInput = document.getElementById('mqtt_pass');
      const icon = this.querySelector('i');
      if (mqttPassInput.type === 'password') {
        mqttPassInput.type = 'text';
        icon.classList.remove('fa-eye');
        icon.classList.add('fa-eye-slash');
      } else {
        mqttPassInput.type = 'password';
        icon.classList.remove('fa-eye-slash');
        icon.classList.add('fa-eye');
      }
    });

    // 表单提交加载动画（保持原有）
    const form = document.getElementById('configForm');
    const submitBtn = document.getElementById('submitBtn');
    const loading = document.getElementById('loading');

    form.addEventListener('submit', function(e) {
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status"></span> 保存中...';
      loading.style.display = 'block';
    });
  </script>
</body>
</html>
