<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>报警日志 - 蔬菜大棚土壤墒情监测平台</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.5.0/dist/echarts.min.js"></script>
    <style>
        body { background: #f8f9fa; }
        .table th { background: #dc3545; color: white; }
        .alert-row { background: #fff5f5; }
        .badge-danger { background: #dc3545; }
        .badge-success { background: #198754; }
        .badge-warning { background: #ffc107; color: #000; }
    </style>
</head>
<body>
    <!-- 统一导航栏 -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-success shadow-sm">
        <div class="container">
            <a class="navbar-brand fw-bold" href="/">🌱 蔬菜大棚土壤墒情监测平台</a>
            <div class="navbar-nav ms-auto">
                <a class="nav-link" href="/">实时监控</a>
                <a class="nav-link" href="/history">历史数据</a>
                <a class="nav-link active" href="/alerts">报警日志</a>
                <a class="nav-link" href="/analysis">大数据分析</a>
                <a class="nav-link" href="/reports">数据报告</a>
                <a class="nav-link" href="/weather">天气查询</a>
                <a class="nav-link" href="/threshold">阈值设置</a>
            </div>
        </div>
    </nav>

    <div class="container mt-4">
        <h2 class="text-center mb-4">🚨 土壤墒情报警日志</h2>

        <div class="card mb-4">
            <div class="card-body">
                <button onclick="loadAlerts()" class="btn btn-danger mb-3">🔄 刷新日志</button>
                <button onclick="clearAllAlerts()" class="btn btn-outline-secondary mb-3 ms-2">🗑️ 清空所有日志</button>
                <span id="loadingMsg" class="ms-3 text-muted" style="display:none;">加载中...</span>
            </div>
        </div>

        <!-- 报警统计饼图 -->
        <div class="card mb-4">
            <div class="card-header bg-white fw-bold">📊 报警类型分布</div>
            <div class="card-body">
                <div id="alertPieChart" style="width:100%; height:350px;"></div>
            </div>
        </div>

        <div class="card shadow-sm">
            <div class="card-header d-flex justify-content-between align-items-center bg-white">
                <h5 class="mb-0">📋 报警记录列表 (最近100条)</h5>
                <span id="alertCount" class="badge bg-danger rounded-pill">0 条</span>
            </div>
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="alertTable">
                        <thead>
                            <tr>
                                <th>报警时间</th>
                                <th>节点 ID</th>
                                <th>报警类型</th>
                                <th>实际值</th>
                                <th>阈值范围</th>
                                <th>状态</th>
                                <th>操作</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr><td colspan="7" class="text-center py-4">暂无数据，点击刷新</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script>
        let pieChart = null;

        // 初始化图表
        function initChart() {
            const chartDom = document.getElementById('alertPieChart');
            if (pieChart) pieChart.dispose();
            pieChart = echarts.init(chartDom);
            
            pieChart.setOption({
                tooltip: { trigger: 'item' },
                legend: { top: '5%', left: 'center' },
                series: [
                    {
                        name: '报警类型',
                        type: 'pie',
                        radius: ['40%', '70%'],
                        avoidLabelOverlap: false,
                        itemStyle: {
                            borderRadius: 10,
                            borderColor: '#fff',
                            borderWidth: 2
                        },
                        label: { show: false, position: 'center' },
                        emphasis: {
                            label: { show: true, fontSize: 20, fontWeight: 'bold' }
                        },
                        labelLine: { show: false },
                        data: []
                    }
                ]
            });
        }

        function loadAlerts() {
            const loadingMsg = document.getElementById('loadingMsg');
            loadingMsg.style.display = 'inline';
            
            fetch('/api/alerts')
                .then(res => {
                    if (!res.ok) throw new Error("网络响应异常");
                    return res.json();
                })
                .then(data => {
                    loadingMsg.style.display = 'none';
                    const tbody = document.querySelector('#alertTable tbody');
                    tbody.innerHTML = '';
                    
                    document.getElementById('alertCount').textContent = data.length + ' 条';

                    if (data.length === 0) {
                        tbody.innerHTML = '<tr><td colspan="7" class="text-center py-4 text-muted">暂无报警记录 🎉</td></tr>';
                        updateChart(0, 0);
                        return;
                    }

                    let tempCount = 0;
                    let humCount = 0;

                    data.forEach(alert => {
                        // ✅ 字段名修正：对应数据库字段
                        const timeStr = alert.timestamp || '未知时间';
                        const nodeId = alert.node_id || 'Unknown';
                        const typeStr = alert.alert_type || '未知类型';
                        const valueStr = alert.actual_value !== undefined ? alert.actual_value : '-';
                        const thresholdStr = alert.threshold_range || '-';
                        const statusStr = alert.status || '未处理';
                        const alertId = alert.id;

                        // 统计类型
                        if (typeStr.includes('温度')) tempCount++;
                        else if (typeStr.includes('湿度')) humCount++;

                        // 状态样式
                        let statusBadge = statusStr === '已处理' 
                            ? '<span class="badge bg-success">已处理</span>' 
                            : '<span class="badge bg-warning text-dark">未处理</span>';
                        
                        // 按钮状态
                        const btnDisabled = statusStr === '已处理' ? 'disabled' : '';
                        const btnClass = statusStr === '已处理' ? 'btn-outline-secondary' : 'btn-sm btn-success';

                        const row = `<tr class="alert-row">
                            <td>${timeStr}</td>
                            <td><strong>${nodeId}</strong></td>
                            <td><span class="badge bg-danger">${typeStr}</span></td>
                            <td>${valueStr}</td>
                            <td>${thresholdStr}</td>
                            <td>${statusBadge}</td>
                            <td>
                                <button class="btn ${btnClass}" 
                                    onclick="markHandled(${alertId})" 
                                    ${btnDisabled}>
                                    ${statusStr === '已处理' ? '已完成' : '标记处理'}
                                </button>
                            </td>
                        </tr>`;
                        tbody.innerHTML += row;
                    });

                    updateChart(tempCount, humCount);
                })
                .catch(err => {
                    console.error(err);
                    loadingMsg.style.display = 'none';
                    document.querySelector('#alertTable tbody').innerHTML = 
                        `<tr><td colspan="7" class="text-center py-4 text-danger">加载失败: ${err.message}</td></tr>`;
                });
        }

        function updateChart(temp, hum) {
            if (!pieChart) initChart();
            pieChart.setOption({
                series: [{
                    data: [
                        { name: '温度报警', value: temp, itemStyle: { color: '#dc3545' } },
                        { name: '湿度报警', value: hum, itemStyle: { color: '#0dcaf0' } }
                    ]
                }]
            });
        }

        function markHandled(id) {
            if (!confirm('确定将该条报警标记为“已处理”吗？')) return;
            
            fetch(`/api/alerts/${id}/handle`, { method: 'POST' })
                .then(res => res.json())
                .then(result => {
                    if (result.code === 200) {
                        loadAlerts(); // 刷新列表
                    } else {
                        alert('操作失败: ' + (result.msg || '未知错误'));
                    }
                })
                .catch(err => alert('网络错误: ' + err));
        }

        function clearAllAlerts() {
            if (confirm('⚠️ 高危操作：确定要清空所有报警日志吗？此操作不可恢复！')) {
                fetch('/api/alerts/clear', { method: 'POST' })
                    .then(res => res.json())
                    .then(result => {
                        if (result.code === 200) {
                            alert('清空成功！');
                            loadAlerts();
                        } else {
                            alert('清空失败: ' + (result.msg || '未知错误'));
                        }
                    })
                    .catch(err => alert('网络错误: ' + err));
            }
        }

        // 初始化
        window.addEventListener('resize', () => pieChart && pieChart.resize());
        window.onload = function() {
            initChart();
            loadAlerts();
            // 每30秒自动刷新
            setInterval(loadAlerts, 30000); 
        };
    </script>
</body>
</html>
